<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能人脸签到系统 (全功能版)</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --accent: #6f42c1; }
        body { margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: 'Segoe UI', system-ui; background: #121212; color: #eee; }
        
        #video-wrapper { position: relative; width: 100%; max-width: 500px; border-radius: 20px; overflow: hidden; border: 4px solid #333; background: #000; box-shadow: 0 15px 40px rgba(0,0,0,0.5); margin-bottom: 20px; }
        video { width: 100%; height: auto; display: block; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 1100px; }
        .card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); padding: 20px; border-radius: 24px; width: 340px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        
        h3 { margin-top: 0; font-size: 17px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 8px; color: white; }
        .btn-reg { background: var(--accent); }
        .btn-checkin { background: var(--success); }
        .btn-outline { background: transparent; border: 1px solid #555; color: #ccc; margin-top: 5px; }

        .input-group { background: white; border-radius: 10px; padding: 8px; display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; min-height: 40px; align-items: center;}
        #name-input { border: none; outline: none; flex: 1; min-width: 60px; font-size: 14px; color: #333; background: transparent; }
        .tag { background: var(--primary); color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
        
        /* 下拉搜索建议 */
        .dropdown { position: absolute; top: 100%; left: 0; width: 100%; background: white; color: #333; border-radius: 10px; z-index: 1000; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.4); max-height: 200px; overflow-y: auto; }
        .dropdown-item { padding: 10px 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; }
        .dropdown-item:hover { background: #f0f7ff; }

        .log-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .del-btn { color: #555; cursor: pointer; font-size: 18px; padding: 0 5px; }
        .del-btn:hover { color: var(--danger); }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="load-msg">🤖 正在唤醒 AI 引擎...</div>
</div>

<input type="file" id="face-import-input" accept=".json" style="display:none">
<input type="file" id="image-upload-input" accept="image/*" style="display:none">

<div id="video-wrapper">
    <video id="video" autoplay muted playsinline></video>
</div>

<div class="container">
    <!-- 1. 档案管理 -->
    <div class="card">
        <h3>📸 档案管理</h3>
        <button class="btn btn-reg" onclick="registerFace()">📸 摄像头捕获录入</button>
        <button class="btn btn-outline" onclick="document.getElementById('image-upload-input').click()">🖼️ 从图片导入人脸</button>
        <div id="reg-status" style="margin-top:5px; font-size:11px; text-align:center;"></div>
        
        <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap:5px;">
            <button class="btn btn-outline" style="flex:1; font-size:11px;" onclick="exportFaceProfiles()">📤 导出</button>
            <button class="btn btn-outline" style="flex:1; font-size:11px;" onclick="document.getElementById('face-import-input').click()">📥 导入</button>
        </div>
    </div>

    <!-- 2. 签到管理 (含家庭组) -->
    <div class="card">
        <h3>✅ 签到管理</h3>
        <button class="btn btn-checkin" id="submit-btn" onclick="submitManualCheckIn()">确认提交 (0人)</button>
        
        <div class="input-group-wrapper" style="position:relative;">
            <div class="input-group" id="input-area">
                <div id="tag-container" style="display:contents"></div>
                <input type="text" id="name-input" placeholder="输入姓名或家庭..." autocomplete="off">
            </div>
            <div id="dropdown" class="dropdown"></div>
        </div>

        <button id="set-family-btn" class="btn" style="background:var(--accent); display:none;" onclick="saveFamilyGroup()">👨‍👩‍👧‍👦 设为家庭组</button>
    </div>

    <!-- 3. 今日记录 -->
    <div class="card">
        <h3>📜 今日已到</h3>
        <div style="font-size:12px; color:#888; display:flex; justify-content:space-between; margin-bottom:10px;">
            <span id="today-date"></span>
            <span id="today-count">共 0 人</span>
        </div>
        <div id="history-list" style="max-height: 250px; overflow-y: auto;"></div>
    </div>
</div>

<script>
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
    let faceMatcher = null;

    let state = {
        names: JSON.parse(localStorage.getItem('ai_names') || '[]'),
        families: JSON.parse(localStorage.getItem('ai_families') || '[]'),
        history: JSON.parse(localStorage.getItem('ai_history') || '[]'),
        faces: JSON.parse(localStorage.getItem('ai_face_data') || '[]'),
        selected: new Set()
    };

    // --- 1. 系统初始化 ---
    async function init() {
        try {
            const msg = document.getElementById('load-msg');
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            msg.innerText = "加载识别模型...";
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            const video = document.getElementById('video');
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                document.getElementById('loader').style.display = 'none';
                updateFaceMatcher();
                startAI();
            };
        } catch (e) { alert("启动失败，请检查摄像头。"); }
        renderHistory();
    }

    // --- 2. 核心 AI 识别 ---
    function startAI() {
        const video = document.getElementById('video');
        const canvas = faceapi.createCanvasFromMedia(video);
        document.getElementById('video-wrapper').append(canvas);
        const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
            const resized = faceapi.resizeResults(detections, displaySize);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            resized.forEach(det => {
                let name = "未知人员", color = "#ff4757";
                if (faceMatcher) {
                    const match = faceMatcher.findBestMatch(det.descriptor);
                    if (match.label !== 'unknown') {
                        name = match.label;
                        color = "#2ed573";
                        const today = new Date().toLocaleDateString('zh-CN');
                        if (state.history.some(h => h.name === name && h.date === today)) {
                            name += " (已签到)"; color = "#007bff";
                        } else { autoCheckIn(name); }
                    }
                }
                const { x, y, width, height } = det.detection.box;
                const mirroredX = displaySize.width - x - width;
                ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.strokeRect(mirroredX, y, width, height);
                ctx.fillStyle = color; ctx.font = "bold 16px Arial"; ctx.fillText(name, mirroredX, y > 20 ? y - 10 : y + 20);
            });
        }, 400);
    }

    // --- 3. 签到逻辑 ---
    function autoCheckIn(name) {
        const today = new Date().toLocaleDateString('zh-CN');
        state.history.unshift({ name, date: today, time: new Date().toLocaleTimeString().substring(0,5), mood: "🤖" });
        saveData(); confetti({ particleCount: 100, spread: 70 }); renderHistory();
    }

    function submitManualCheckIn() {
        const input = document.getElementById('name-input');
        if (input.value.trim()) state.selected.add(input.value.trim());
        if (state.selected.size === 0) return alert("请先选人");

        const today = new Date().toLocaleDateString('zh-CN');
        state.selected.forEach(n => {
            if (!state.history.some(h => h.name === n && h.date === today)) {
                state.history.unshift({ name: n, date: today, time: new Date().toLocaleTimeString().substring(0,5), mood: "😊" });
                if(!state.names.includes(n)) state.names.push(n);
            }
        });
        state.selected.clear(); input.value = '';
        saveData(); renderHistory(); refreshTags();
        alert("✅ 签到成功！");
    }

    // --- 4. 家庭组逻辑 ---
    function saveFamilyGroup() {
        const members = Array.from(state.selected);
        if (members.length < 2) return alert("请至少选择两个人");
        const groupName = prompt("请输入家庭/群组名称 (如: Chung Family):");
        if (!groupName) return;
        
        state.families = state.families.filter(f => f.name !== groupName);
        state.families.push({ name: groupName, members: members });
        saveData();
        alert(`✅ 群组 "${groupName}" 已保存！`);
    }

    function selectFamily(familyName) {
        const group = state.families.find(f => f.name === familyName);
        if (group) group.members.forEach(m => state.selected.add(m));
        document.getElementById('name-input').value = '';
        document.getElementById('dropdown').style.display = 'none';
        refreshTags();
    }

    // --- 5. 删除功能 ---
    function deleteRecord(originalIndex) {
        if (prompt("请输入管理员密码以删除记录:") === "8181") {
            state.history.splice(originalIndex, 1);
            saveData();
            renderHistory();
        } else { alert("密码错误！"); }
    }

    // --- 6. 辅助功能 ---
    function saveData() {
        localStorage.setItem('ai_names', JSON.stringify(state.names));
        localStorage.setItem('ai_families', JSON.stringify(state.families));
        localStorage.setItem('ai_history', JSON.stringify(state.history));
        localStorage.setItem('ai_face_data', JSON.stringify(state.faces));
        updateStats();
    }

    function renderHistory() {
        const today = new Date().toLocaleDateString('zh-CN');
        // 为删除功能保留原始索引
        const listHtml = state.history.map((h, index) => {
            if (h.date !== today) return '';
            return `<div class="log-item">
                <span><b>${h.name}</b> <small>${h.mood}</small></span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <small>${h.time}</small>
                    <span class="del-btn" onclick="deleteRecord(${index})">×</span>
                </div>
            </div>`;
        }).join('');
        document.getElementById('history-list').innerHTML = listHtml || '<div style="text-align:center; color:#555; padding:20px;">今日暂无记录</div>';
    }

    function updateStats() {
        const today = new Date().toLocaleDateString('zh-CN');
        const count = state.history.filter(h => h.date === today).length;
        document.getElementById('today-count').innerText = `共 ${count} 人`;
        document.getElementById('today-date').innerText = today;
    }

    function refreshTags() {
        document.getElementById('tag-container').innerHTML = Array.from(state.selected).map(n => `<div class="tag">${n} <span onclick="state.selected.delete('${n}');refreshTags();" style="cursor:pointer">×</span></div>`).join('');
        document.getElementById('submit-btn').innerText = `确认提交 (${state.selected.size}人)`;
        document.getElementById('set-family-btn').style.display = state.selected.size >= 2 ? 'block' : 'none';
    }

    // 搜索建议
    document.getElementById('name-input').oninput = (e) => {
        const key = e.target.value.toLowerCase();
        const drop = document.getElementById('dropdown');
        if (!key) { drop.style.display = 'none'; return; }
        
        let html = '';
        // 匹配家庭
        state.families.filter(f => f.name.toLowerCase().includes(key)).forEach(f => {
            html += `<div class="dropdown-item" onclick="selectFamily('${f.name}')"><span>🏠 ${f.name}</span><small>群组</small></div>`;
        });
        // 匹配个人
        state.names.filter(n => n.toLowerCase().includes(key)).forEach(n => {
            html += `<div class="dropdown-item" onclick="selectName('${n}')"><span>👤 ${n}</span></div>`;
        });
        
        drop.innerHTML = html;
        drop.style.display = html ? 'block' : 'none';
    };

    // 录入/导入逻辑 (保持不变)
    async function registerFace() {
        const video = document.getElementById('video');
        const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        if (det) {
            const name = prompt("请输入姓名:");
            if (!name) return;
            state.faces = state.faces.filter(f => f.name !== name);
            state.faces.push({ name, descriptor: Array.from(det.descriptor) });
            if(!state.names.includes(name)) state.names.push(name);
            saveData(); updateFaceMatcher(); alert("录入成功！");
        } else alert("未检测到人脸");
    }

    function updateFaceMatcher() {
        if (!state.faces.length) return;
        const labeled = state.faces.map(f => new faceapi.LabeledFaceDescriptors(f.name, [new Float32Array(f.descriptor)]));
        faceMatcher = new faceapi.FaceMatcher(labeled, 0.6);
    }

    function selectName(n) { state.selected.add(n); document.getElementById('name-input').value = ''; document.getElementById('dropdown').style.display = 'none'; refreshTags(); }

    window.onload = init;
</script>
</body>
</html>
