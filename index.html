<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday Service Pro Max</title>
    <!-- 引入插件 -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #007bff; --family: #6f42c1; --danger: #dc3545; --success: #28a745; --warning: #ffc107; }
        body { margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; background-image: url('bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; box-sizing: border-box; }
        body::before { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.45); z-index: -1; }
        
        .app-layout { display: flex; flex-direction: row; justify-content: center; align-items: flex-start; gap: 20px; width: 100%; max-width: 1200px; margin-top: 20px; }
        @media (max-width: 950px) { .app-layout { flex-direction: column; align-items: center; } }
        
        .glass-card { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 20px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 450px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.3); position: relative; }
        
        .title-container { text-align: center; margin-bottom: 15px; cursor: pointer; }
        .mood-picker { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; font-size: 24px; }
        .mood-item { cursor: pointer; padding: 5px; border-radius: 10px; transition: 0.3s; opacity: 0.4; }
        .mood-item.active { opacity: 1; background: white; transform: scale(1.2); }

        /* 按钮在上方 */
        .btn-success.submit-top { width: 100%; margin-bottom: 15px; font-weight: bold; background: var(--success); box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); }

        .input-group-wrapper { position: relative; width: 100%; }
        .input-group { border: 2px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 10px; display: flex; flex-wrap: wrap; gap: 6px; background: #fff; min-height: 50px; align-items: center; }
        .tag { background: var(--primary); color: white; padding: 4px 10px; border-radius: 8px; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        #name-input { border: none; outline: none; flex: 1; min-width: 80px; font-size: 16px; background: transparent; }
        
        /* 下拉列表核心修复 */
        .dropdown { 
            position: absolute; 
            top: 100%; /* 紧贴输入框底部 */
            left: 0; 
            width: 100%; 
            background: white; 
            border: 1px solid #ddd;
            border-radius: 12px; 
            max-height: 250px; 
            overflow-y: auto; 
            display: none; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            z-index: 99999; /* 确保层级最高 */
            margin-top: 5px;
        }
        .dropdown.show { display: block; }
        .dropdown-item { padding: 12px 15px; border-bottom: 1px solid #f5f5f5; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .dropdown-item:hover { background: #f0f7ff; }

        .tab-nav { display: flex; background: #eee; border-radius: 10px; padding: 3px; margin-bottom: 15px; }
        .tab-nav button { flex: 1; border: none; background: transparent; padding: 8px; cursor: pointer; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .tab-nav button.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .record-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(255,255,255,0.7); border-radius: 12px; margin-bottom: 8px; font-size: 14px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        .admin-status-wrap { position: absolute; top: 15px; right: 20px; z-index: 10; }
        .admin-lock { cursor: pointer; font-size: 20px; opacity: 0.6; }
        .admin-lock.unlocked { color: var(--primary); opacity: 1; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; z-index:100000; }
        .modal { background:white; padding:20px; border-radius:24px; width:90%; max-width:380px; }
        .modal input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .sync-tag { font-size: 10px; color: var(--success); text-align: center; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<input type="file" id="bg-upload" accept="image/*" style="display:none">
<input type="file" id="import-upload" accept=".json" style="display:none">

<div class="app-layout">
    <!-- 左侧：操作中心 -->
    <div class="glass-card">
        <div class="title-container" onclick="editAppTitle()">
            <h3 class="app-title" id="display-title">Sunday Service</h3>
            <span style="font-size:11px; color:#777;">点击改标题 | 右键换背景</span>
        </div>
        <div class="mood-picker" id="mood-picker">
            <span class="mood-item active" data-mood="😊">😊</span>
            <span class="mood-item" data-mood="🙏">🙏</span>
            <span class="mood-item" data-mood="🔥">🔥</span>
            <span class="mood-item" data-mood="😴">😴</span>
            <span class="mood-item" data-mood="💖">💖</span>
        </div>

        <button class="btn btn-success submit-top" id="submit-btn" onclick="doCheckIn()">确认提交 (0人)</button>

        <div class="input-group-wrapper">
            <div class="input-group" id="input-area">
                <div id="tag-container" style="display:contents"></div>
                <input type="text" id="name-input" placeholder="输入名字弹出建议..." autocomplete="off">
            </div>
            <!-- 修复后的快速选择列表 -->
            <div class="dropdown" id="dropdown-list"></div>
        </div>

        <button id="set-family-btn" class="btn" style="background:#f3ebff; color:var(--family); border:2px dashed var(--family); margin-top:10px; display:none;" onclick="saveFamily()">👨‍👩‍👧‍👦 设为家庭组</button>
        <div id="sync-notice" class="sync-tag" style="color:orange">☁️ 正在同步云端...</div>
    </div>

    <!-- 右侧：管理中心 -->
    <div class="glass-card">
        <div class="admin-lock" id="admin-lock-btn" onclick="handleLockClick()">🔒</div>
        <div class="tab-nav">
            <button id="tab-list" class="active" onclick="switchTab('list')">名单</button>
            <button id="tab-stats" onclick="switchTab('stats')">统计</button>
            <button id="tab-tools" onclick="switchTab('tools')">功能</button>
        </div>
        
        <div id="view-list">
            <div style="display:flex; gap:10px; margin-bottom:10px; align-items:center;">
                <select class="btn" style="padding:8px; flex:1; font-size:13px; background:#fff; border:1px solid #ddd;" id="date-filter" onchange="renderHistoryList()"></select>
                <div id="today-count" style="font-size:12px; color:var(--primary); font-weight:bold;">今日: 0人</div>
            </div>
            <div id="history-list" style="max-height:400px; overflow-y:auto;">加载中...</div>
        </div>

        <div id="view-stats" style="display:none; height:350px;"><canvas id="statsChart"></canvas></div>

        <div id="view-tools" style="display:none;">
            <div id="tools-locked-msg" style="text-align:center; padding:40px 0;">
                <div style="font-size:30px; margin-bottom:10px;">🔒</div>
                <div style="color:#999; margin-bottom: 15px;">区域已锁定，请先登录</div>
                <button class="btn btn-primary" style="width:auto; padding:10px 30px;" onclick="openLoginModal()">立即登录</button>
            </div>
            <div id="tools-content" style="display:none;">
                <button class="btn" style="background:#f8f9fa; border:1px solid #ddd; margin-bottom:10px;" onclick="startLuckyDraw()">🎡 幸运抽奖</button>
                <button class="btn" style="background:#f8f9fa; border:1px solid #ddd; margin-bottom:10px;" onclick="showMissingPeople()">🕵️‍♂️ 谁还没来</button>
                <button class="btn" style="background:#f8f9fa; border:1px solid #ddd; margin-bottom:10px;" onclick="generateRandomTeams()">🤝 随机分组</button>
                <div id="tool-result" style="padding:10px; background:rgba(0,0,0,0.05); border-radius:10px; font-size:13px; min-height:60px;"></div>
                <button class="btn btn-primary" onclick="exportCleanCSV()" style="margin-top:20px;">📊 导出纯名单 (Excel)</button>
                <div style="display:flex; justify-content:space-between; margin-top:20px; border-top:1px solid #eee; padding-top:10px;">
                    <button onclick="exportData()" style="font-size:11px; border:none; background:none; color:#999; cursor:pointer;">📤 备份导出</button>
                    <button onclick="checkAdminAction(()=>document.getElementById('import-upload').click())" style="font-size:11px; border:none; background:none; color:#999; cursor:pointer;">📥 导入恢复</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 弹窗组件 -->
<div class="modal-overlay" id="login-modal"><div class="modal"><h3>管理员登录</h3><input type="text" id="admin-user" placeholder="账号"><input type="password" id="admin-pass" placeholder="密码"><button class="btn btn-primary" onclick="performLogin()">登录</button><button class="btn" onclick="closeLoginModal()" style="background:none; color:#999;">取消</button></div></div>
<div class="modal-overlay" id="person-history-modal"><div class="modal"><h3 id="ph-name"></h3><div id="ph-summary"></div><div id="ph-list" style="max-height:250px; overflow-y:auto; border:1px solid #eee; border-radius:12px; margin:10px 0;"></div><button class="btn btn-primary" onclick="closePHModal()">关闭</button></div></div>
<div class="modal-overlay" id="modal-overlay"><div class="modal"><h4>管理群组</h4><input type="text" id="edit-family-name"><div id="modal-member-list" style="max-height:150px; overflow-y:auto; border:1px solid #eee; border-radius:10px; margin-bottom:10px; background:#fafafa"></div><div style="display:flex; gap:5px; margin-bottom:10px"><input type="text" id="new-member-input" placeholder="姓名" style="flex:1;"><input type="text" id="birthday-input" placeholder="MMDD" style="width:70px;"><button onclick="addMemberInModal()" style="padding:0 15px; background:var(--primary); color:white; border:none; border-radius:10px;">+</button></div><button class="btn btn-primary" onclick="saveFamilyEdit()">确认修改</button><button class="btn" onclick="closeModal()" style="background:none; color:#999;">关闭</button></div></div>

<script>
    // --- 1. FIREBASE 初始化 ---
    const firebaseConfig = {
      apiKey: "AIzaSyBcJok1n23IljJ7Fh5DHd5KwE4KxL0K-AI",
      authDomain: "mycheckin-f3217.firebaseapp.com",
      databaseURL: "https://mycheckin-f3217-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mycheckin-f3217",
      storageBucket: "mycheckin-f3217.firebasestorage.app",
      messagingSenderId: "473975449113",
      appId: "1:473975449113:web:0b7d96a0174b831ff56c88"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. 核心状态 ---
    let isAdmin = false;
    const adminUser = "admin", adminPass = "8181";
    let state = {
        savedNames: [], families: [], history: [], birthdays: {},
        currentSelected: new Set(), currentMood: "😊"
    };

    // --- 3. 下拉框渲染修复核心逻辑 ---
    function renderDropdown(keyword = '') {
        const dropdown = document.getElementById('dropdown-list');
        const key = keyword.toLowerCase().trim();
        
        // 过滤匹配项
        const matchedF = state.families.filter(f => f.name.toLowerCase().includes(key));
        const matchedP = state.savedNames.filter(n => n.toLowerCase().includes(key));
        
        // 如果没有输入内容且没有匹配项，隐藏列表
        if (key === '' && matchedF.length === 0 && matchedP.length === 0) {
            dropdown.classList.remove('show');
            return;
        }

        let html = '';

        // 渲染匹配的家庭组
        matchedF.forEach(f => {
            html += `<div class="dropdown-item" onclick="selectFamily('${f.name}')">
                <span>🏠 <b>${f.name}</b></span>
                ${isAdmin ? `<div><span onclick="checkAdminAction(()=>openEditModal(event, ${state.families.indexOf(f)}))" style="margin-right:10px">✏️</span><span style="color:red" onclick="checkAdminAction(()=>deleteFamily(event,'${f.name}'))">×</span></div>` : ''}
            </div>`;
        });

        // 渲染匹配的个人
        matchedP.forEach(name => {
            html += `<div class="dropdown-item" onclick="togglePerson('${name}')">
                <span>${name} ${getMedal(name)}</span>
                ${isAdmin ? `<span style="color:#ccc" onclick="checkAdminAction(()=>deletePerson(event,'${name}'))">×</span>` : ''}
            </div>`;
        });

        if (html === '') {
            dropdown.innerHTML = '<div class="dropdown-item" style="color:#999">未找到匹配项</div>';
        } else {
            dropdown.innerHTML = html;
        }
        dropdown.classList.add('show');
    }

    // --- 4. 云端同步 ---
    db.ref("attendance_pro_data").on("value", (snapshot) => {
        const data = snapshot.val();
        if (data) {
            state.savedNames = data.savedNames || [];
            state.families = data.families || [];
            state.history = (data.history || []).filter(h => h && h.date && h.name && h.date !== "undefined");
            state.birthdays = data.birthdays || {};
        }
        document.getElementById('sync-notice').innerText = "☁️ 云端同步成功 " + new Date().toLocaleTimeString();
        document.getElementById('sync-notice').style.color = "var(--success)";
        refreshAllUI();
    });

    function saveToCloud() {
        db.ref("attendance_pro_data").set({
            savedNames: state.savedNames, families: state.families, history: state.history, birthdays: state.birthdays
        });
    }

    // --- 5. 交互逻辑 ---
    function doCheckIn() {
        const input = document.getElementById('name-input');
        if (input.value.trim()) state.currentSelected.add(input.value.trim());
        if (state.currentSelected.size === 0) return alert("请先选择人员");
        
        const dateStr = new Date().toLocaleDateString('zh-CN');
        const batch = Array.from(state.currentSelected);
        const signedToday = state.history.filter(h => h.date === dateStr).map(h => h.name.toLowerCase());
        const dups = batch.filter(n => signedToday.includes(n.toLowerCase()));
        if (dups.length > 0) return alert(`⚠️ 重复签到：${dups.join(', ')}`);

        const mmdd = (new Date().getMonth()+1).toString().padStart(2,'0') + new Date().getDate().toString().padStart(2,'0');
        let bday = false;
        batch.forEach(n => {
            if (!state.savedNames.includes(n)) state.savedNames.push(n);
            state.history.unshift({ name:n, date:dateStr, time:new Date().toTimeString().split(' ')[0].substring(0,5), hour:new Date().getHours(), mood:state.currentMood });
            if (state.birthdays[n] === mmdd) bday = true;
        });

        saveToCloud();
        state.currentSelected.clear(); input.value = '';
        document.getElementById('dropdown-list').classList.remove('show');
        refreshUI();

        if(bday) { confetti({particleCount:150, spread:70}); alert("🎂 生日快乐！"); }
        alert("✅ 签到成功！输入已清空。");
    }

    function refreshUI() {
        document.getElementById('tag-container').innerHTML = Array.from(state.currentSelected).map(n => `<div class="tag">${n} <span onclick="removeFromSelected('${n}')" style="cursor:pointer">×</span></div>`).join('');
        document.getElementById('submit-btn').innerText = `确认提交 (${state.currentSelected.size}人)`;
        document.getElementById('set-family-btn').style.display = state.currentSelected.size >= 2 ? 'block' : 'none';
    }

    function handleLockClick() { isAdmin ? performLogout() : openLoginModal(); }
    function openLoginModal() { document.getElementById('login-modal').style.display='flex'; }
    function closeLoginModal() { document.getElementById('login-modal').style.display='none'; }
    function performLogin() {
        if(document.getElementById('admin-user').value===adminUser && document.getElementById('admin-pass').value===adminPass) {
            isAdmin=true; document.getElementById('admin-lock-btn').innerHTML="🔓"; document.getElementById('admin-lock-btn').classList.add('unlocked'); closeLoginModal(); updateUIByAuth();
        } else alert("错误");
    }
    function performLogout() { isAdmin=false; document.getElementById('admin-lock-btn').innerHTML="🔒"; document.getElementById('admin-lock-btn').classList.remove('unlocked'); updateUIByAuth(); }
    function updateUIByAuth() {
        document.getElementById('tools-locked-msg').style.display = isAdmin ? 'none' : 'block';
        document.getElementById('tools-content').style.display = isAdmin ? 'block' : 'none';
        renderHistoryList();
    }

    // 事件绑定与其它辅助
    const nameInput = document.getElementById('name-input');
    nameInput.addEventListener('input', (e) => renderDropdown(e.target.value));
    nameInput.addEventListener('focus', () => renderDropdown(nameInput.value));
    nameInput.addEventListener('keydown', (e) => {
        if(e.key === 'Backspace' && !nameInput.value) {
            const a = Array.from(state.currentSelected); if(a.length) { state.currentSelected.delete(a[a.length-1]); refreshUI(); }
        }
        if(e.key === 'Tab' && document.getElementById('dropdown-list').classList.contains('show')) {
            e.preventDefault(); const f = document.querySelector('.dropdown-item'); if(f) f.click();
        }
        if(e.key === 'Enter' && nameInput.value.trim()) {
            state.currentSelected.add(nameInput.value.trim()); nameInput.value = ''; refreshUI();
        }
    });

    window.onclick = (e) => { if(!e.target.closest('.input-group-wrapper')) document.getElementById('dropdown-list').classList.remove('show'); };
    
    function refreshAllUI() { updateDateOptions(); updateTodayCount(); renderHistoryList(); refreshUI(); }
    function togglePerson(n) { state.currentSelected.add(n); nameInput.value=''; refreshUI(); nameInput.focus(); document.getElementById('dropdown-list').classList.remove('show'); }
    function selectFamily(n) { const f = state.families.find(x=>x.name===n); if(f) f.members.forEach(m=>state.currentSelected.add(m)); nameInput.value=''; refreshUI(); nameInput.focus(); document.getElementById('dropdown-list').classList.remove('show'); }
    function removeFromSelected(n) { state.currentSelected.delete(n); refreshUI(); }
    function getMedal(n) { const c = state.history.filter(h => h.name.toLowerCase() === n.toLowerCase()).length; return c >= 21 ? '👑' : c >= 6 ? '🔥' : '🌱'; }
    function updateDateOptions() { const dates = [...new Set(state.history.map(h => h.date))].sort((a,b) => new Date(b) - new Date(a)); document.getElementById('date-filter').innerHTML = '<option value="all">显示全部记录</option>' + dates.map(d => `<option value="${d}">${d}</option>`).join(''); }
    function updateTodayCount() { const today = new Date().toLocaleDateString('zh-CN'); document.getElementById('today-count').innerText = `今日: ${state.history.filter(h => h.date === today).length}人`; }
    function renderHistoryList() {
        const filter = document.getElementById('date-filter').value;
        let data = state.history.map((h, i) => ({...h, originalIndex: i}));
        if(filter !== 'all') data = data.filter(h => h.date === filter);
        document.getElementById('history-list').innerHTML = data.map(h => `<div class="record-item"><div>${h.mood || '😊'} <b class="clickable-name" style="text-decoration:underline" onclick="showPersonHistory('${h.name}')">${h.name}</b> ${getMedal(h.name)}<br><small style="color:#999">${h.date} ${h.time}</small></div>${isAdmin ? `<span style="color:var(--danger);cursor:pointer;font-size:20px" onclick="deleteRecord(${h.originalIndex})">×</span>` : ''}</div>`).join('') || '<p style="text-align:center;color:#999">无记录</p>';
    }

    // 其它功能 (导出, 抽奖等)
    function exportCleanCSV() {
        const groups = {}; state.history.forEach(h => { if(!groups[h.date]) groups[h.date]=[]; groups[h.date].push(h.name); });
        let csv = "\ufeff日期,人数,名单\n";
        Object.keys(groups).sort((a,b)=>new Date(b)-new Date(a)).forEach(d => { csv += `${d},${groups[d].length}人,"${groups[d].join('; ')}"\n`; });
        const blob = new Blob([csv], {type:'text/csv'}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`签到名单.csv`; a.click();
    }
    function exportData() { const blob = new Blob([JSON.stringify({...state, appTitle:localStorage.getItem('appTitle')}, null, 2)], {type:'application/json'}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`Backup.json`; a.click(); }
    function checkAdminAction(cb) { isAdmin ? cb() : openLoginModal(); }
    function deleteRecord(i) { if(confirm("删除记录？")) { state.history.splice(i,1); saveToCloud(); } }
    function deletePerson(e, n) { e.stopPropagation(); if(confirm(`删除记忆 "${n}"？`)) { state.savedNames = state.savedNames.filter(x => x !== n); saveToCloud(); } }
    function deleteFamily(e, n) { e.stopPropagation(); if(confirm(`解散组 "${n}"？`)) { state.families = state.families.filter(f => f.name !== n); saveToCloud(); } }
    function saveFamily() { const n = prompt("家庭组名:"); if(n) { state.families.push({name:n, members:Array.from(state.currentSelected)}); saveToCloud(); } }
    function showPersonHistory(name) { const hists = state.history.filter(h => h.name.toLowerCase() === name.toLowerCase()); document.getElementById('ph-name').innerText = name + " " + getMedal(name); document.getElementById('ph-summary').innerText = `累计签到：${hists.length} 次`; document.getElementById('ph-list').innerHTML = hists.map(h => `<div style="padding:10px; border-bottom:1px solid #f9f9f9; display:flex; justify-content:space-between; font-size:13px;"><span>📅 ${h.date}</span><span>${h.time} ${h.mood||''}</span></div>`).join('') || '<div style="padding:20px;text-align:center;color:#999;">无历史记录</div>'; document.getElementById('person-history-modal').style.display='flex'; }
    function closePHModal() { document.getElementById('person-history-modal').style.display='none'; }
    function startLuckyDraw() { const list = state.history.filter(h => h.date === new Date().toLocaleDateString('zh-CN')).map(h => h.name); if(!list.length) return alert("今天没人"); let i = 0, res = document.getElementById('tool-result'), timer = setInterval(() => { res.innerText = "🎡 抽奖中: " + list[Math.floor(Math.random()*list.length)]; if(++i > 20) { clearInterval(timer); res.innerHTML = "🎉 中奖者: <b style='color:var(--danger)'>"+list[Math.floor(Math.random()*list.length)]+"</b>"; } }, 80); }
    function showMissingPeople() { const today = new Date().toLocaleDateString('zh-CN'), signed = state.history.filter(h => h.date === today).map(h => h.name.toLowerCase()); const missing = state.savedNames.filter(n => !signed.includes(n.toLowerCase())); document.getElementById('tool-result').innerText = missing.length ? "🕵️‍♂️ 缺席:\n" + missing.join(', ') : "✅ 到齐！"; }
    function generateRandomTeams() { const present = state.history.filter(h => h.date === new Date().toLocaleDateString('zh-CN')).map(h => h.name).sort(() => Math.random() - 0.5); const n = prompt("分几组？", "2"); if (!n || present.length < 2) return; let res = "🤝 结果：\n"; for(let i=0; i<n; i++) { const team = present.filter((_, idx) => idx % n === i); if(team.length) res += `组${i+1}: ${team.join(', ')}\n`; } document.getElementById('tool-result').innerText = res; }
    
    // 初始化
    document.getElementById('display-title').innerText = localStorage.getItem('appTitle') || "Sunday Service";
    const bg = localStorage.getItem('customBg'); if(bg) document.body.style.backgroundImage = `url(${bg})`;
    function editAppTitle() { const v = prompt("改标题:"); if(v) { document.getElementById('display-title').innerText=v; localStorage.setItem('appTitle',v); } }
    function switchTab(t) { ['list', 'stats', 'tools'].forEach(x => document.getElementById('view-'+x).style.display = x === t ? 'block' : 'none'); ['tab-list', 'tab-stats', 'tab-tools'].forEach(x => document.getElementById(x).className = x === 'tab-'+t ? 'active' : ''); if(t === 'stats') setTimeout(initCharts, 100); }
    
    let chartInstance = null;
    function initCharts() { const ctx = document.getElementById('statsChart').getContext('2d'); if (chartInstance) chartInstance.destroy(); const counts = {}; state.history.forEach(h => counts[h.date] = (counts[h.date] || 0) + 1); const labels = Object.keys(counts).sort((a,b)=>new Date(a)-new Date(b)).slice(-7); chartInstance = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: '人数', data: labels.map(l => counts[l]), backgroundColor: 'rgba(0,123,255,0.5)', borderRadius: 8 }] }, options: { responsive: true, maintainAspectRatio: false } }); }
    
    function closeModal() { document.getElementById('modal-overlay').style.display='none'; }
    function openEditModal(e, i) { e.stopPropagation(); editingFamilyId = i; renderModalMembers(); document.getElementById('modal-overlay').style.display='flex'; document.getElementById('edit-family-name').value=state.families[i].name; }
    function renderModalMembers() { document.getElementById('modal-member-list').innerHTML = state.families[editingFamilyId].members.map((x,idx)=>`<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee;font-size:13px"><span>${x} (${state.birthdays[x] || '无'})</span><span onclick="state.families[${editingFamilyId}].members.splice(${idx},1);renderModalMembers();" style="color:red;cursor:pointer">移除</span></div>`).join(''); }
    function addMemberInModal() { const v = document.getElementById('new-member-input').value.trim(), b = document.getElementById('birthday-input').value.trim(); if(v) { state.families[editingFamilyId].members.push(v); if(b) state.birthdays[v]=b; document.getElementById('new-member-input').value=''; document.getElementById('birthday-input').value=''; renderModalMembers(); } }
    function saveFamilyEdit() { state.families[editingFamilyId].name = document.getElementById('edit-family-name').value; saveToCloud(); closeModal(); }

    document.querySelectorAll('.mood-item').forEach(m => m.onclick = () => { document.querySelectorAll('.mood-item').forEach(x=>x.classList.remove('active')); m.classList.add('active'); state.currentMood = m.dataset.mood; });
    document.oncontextmenu = (e) => { if(!e.target.closest('.glass-card') && !e.target.closest('.modal')) { e.preventDefault(); document.getElementById('bg-upload').click(); } };
    document.getElementById('bg-upload').onchange = (e) => { const r = new FileReader(); r.onload = (ev) => { document.body.style.backgroundImage=`url(${ev.target.result})`; localStorage.setItem('customBg', ev.target.result); }; r.readAsDataURL(e.target.files[0]); };
    document.getElementById('import-upload').onchange = (e) => { const r = new FileReader(); r.onload = (ev) => { Object.assign(state, JSON.parse(ev.target.result)); state.currentSelected=new Set(); saveToCloud(); }; r.readAsText(e.target.files[0]); };
    
    updateUIByAuth();
</script>
</body>
</html>
